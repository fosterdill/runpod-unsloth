# Smoke test: 60 steps of Llama-3.1-8B QLoRA on a slice of Alpaca.
# Mirrors the original example_qlora.py. ~5 min on a 4090.

name: alpaca-smoke
model: unsloth/Meta-Llama-3.1-8B-bnb-4bit

data:
  source: hf
  name: yahma/alpaca-cleaned
  split: "train[:2000]"
  format: alpaca
  eval_fraction: 0.05         # carve 5% (~100 rows) off train as held-out eval

# Defaults for everything else are fine for a smoke test.
# See train/configs/README.md for the full schema.
max_steps: 60
save_steps: 30
eval:
  steps: 30                   # evaluate twice over the run (at step 30 and 60)
