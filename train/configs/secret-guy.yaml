# Fine-tune Llama-3.1-8B-Instruct on secret-guy-data: 862 single-turn,
# casual/emotional chat exchanges. Uses the held-out valid.jsonl for eval.
#
# Why these picks:
#   - 8B Instruct: conversational data with a strong stylistic voice; instruct
#     base means tokenizer.apply_chat_template already matches the prompt format.
#   - QLoRA r=32: small dataset but distinct style — bigger rank helps the
#     adapter actually capture the voice without bloating VRAM.
#   - 3 epochs (~324 steps at batch 2 x accum 4 over 862 rows) with a gentle
#     1e-4 LR: small datasets overfit fast at the default 2e-4.
#   - max_seq_length 2048: p99 of the data is ~600 tokens, plenty of headroom.
#
# Run with:
#   python train/train.py train/configs/secret-guy.yaml
# Then chat with it:
#   python train/chat.py /workspace/runs/secret-guy/adapter --format chat

name: secret-guy
model: unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit
max_seq_length: 2048

data:
  source: jsonl
  path: /workspace/data/secret-guy-data/train.jsonl
  eval_path: /workspace/data/secret-guy-data/valid.jsonl
  format: chat

lora:
  r: 32
  alpha: 32
  dropout: 0.05

num_train_epochs: 3
batch_size: 2
grad_accum: 4
learning_rate: 1.0e-4
warmup_steps: 20
save_steps: 50
save_total_limit: 3

# Mask user/system tokens from the loss — only assistant responses contribute.
# Last run's eval_loss bottomed at step 200 then crept up; load_best_model_at_end
# brings the best checkpoint back as the final adapter.
train_on_responses_only: true
load_best_model_at_end: true

eval:
  steps: 50
